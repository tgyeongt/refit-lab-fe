name: "🚀 기능 제안"
description: "새로운 기능이나 개선사항을 제안해주세요."
title: "[FEAT] : "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ 새로운 기능 제안  
        아이디어나 개선점을 아래 형식에 맞게 작성해주세요.

  - type: textarea
    id: summary
    attributes:
      label: "💡 제안 요약"
      description: "어떤 기능을 추가하고 싶은지 간단히 요약해주세요."
      placeholder: "예: 사이드바에 다크 모드 전환 버튼 추가"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "🎯 필요성"
      description: "이 기능이 왜 필요한지, 어떤 문제를 해결하는지 작성해주세요."
      placeholder: "예: 야간 사용자들이 눈의 피로를 줄일 수 있습니다."
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: "🧠 구현 아이디어"
      description: "구현 방식, 참고 자료, 관련 코드가 있다면 작성해주세요."
      placeholder: "예: Tailwind 다크 모드 프리셋 적용"

  - type: textarea
    id: additional
    attributes:
      label: "💬 추가 내용"
      description: "기타 참고할 점이 있다면 작성해주세요."
      placeholder: "예: 다른 프로젝트에서 비슷한 기능을 봤습니다 (링크 첨부)."
