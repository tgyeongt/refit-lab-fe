name: 🐞 버그 리포트
description: 버그(오류)를 발견했을 때 작성해주세요.
title: "[BUG] : "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🧩 버그 리포트  
        문제가 발생한 상황을 아래에 구체적으로 작성해주세요.

  - type: textarea
    id: what-happened
    attributes:
      label: "❗ 발생한 문제"
      description: "어떤 현상이 발생했는지, 에러 메시지와 함께 자세히 적어주세요."
      placeholder: "예: 로그인 버튼을 눌러도 반응이 없습니다."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🪜 재현 단계"
      description: "문제를 재현할 수 있는 구체적인 단계를 작성해주세요."
      placeholder: |
        1. 로그인 페이지 접속  
        2. 이메일 입력  
        3. 로그인 버튼 클릭  
        4. 오류 발생
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: "🌐 브라우저 / 환경"
      placeholder: "Chrome 141 / macOS 15.1"

  - type: textarea
    id: screenshots
    attributes:
      label: "🖼️ 스크린샷"
      description: "문제가 잘 드러나는 스크린샷을 첨부해주세요."

  - type: textarea
    id: additional
    attributes:
      label: "💬 추가 정보"
      description: "참고할 만한 로그, 에러, URL 등을 남겨주세요."
